services:
  station-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: station-simulator
    environment:
      MQTT_HOST: ${MQTT_HOST:-emqx}
      MQTT_PORT: ${MQTT_PORT:-1883}
      SIMULATOR_STATIONS: ${SIMULATOR_STATIONS:-3}
      SIMULATOR_AUTO_BOOT: ${SIMULATOR_AUTO_BOOT:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WS_PORT: ${WS_PORT:-8085}
      API_PORT: ${API_PORT:-8086}
    ports:
      - "${WS_PORT:-8085}:8085"
      - "${API_PORT:-8086}:8086"
    volumes:
      - ./scenarios:/app/scenarios:ro
      - ./config/stations:/app/config/stations:ro
      - ./keys:/app/keys:ro
    networks:
      - csms-network
    restart: unless-stopped

networks:
  csms-network:
    external: true
    name: ${CSMS_NETWORK:-csms-network}
