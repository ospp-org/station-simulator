name: "Meter Values Streaming"
description: "Start a session via CSMS API and verify MeterValues are sent with monotonically increasing values"
station_count: 1
timeout_seconds: 90
tags: [session, meter_values]

config:
  csms_url: "http://csms-nginx"
  csms_auth:
    email: "admin@csms.local"
    password: "password"

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Wait for bays ready"
    type: delay
    duration_ms: 2000

  - name: "Start service via CSMS API"
    type: api_call
    method: POST
    path: "/api/v1/sessions/start"
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
    expect_status: 201
    capture:
      session_id: "data.id"

  - name: "Wait for StartService"
    type: wait_for
    action: StartService
    message_type: REQUEST
    timeout_ms: 25000

  - name: "Wait for handler to process"
    type: delay
    duration_ms: 500

  - name: "Assert session active"
    type: assert
    assertion: session_active
    params:
      bay_number: 1
      expected: true

  - name: "Wait for 3 MeterValues"
    type: repeat
    count: 3
    steps:
      - name: "Wait for MeterValues event"
        type: wait_for
        action: MeterValues
        message_type: EVENT
        timeout_ms: 25000

  - name: "Assert at least 3 MeterValues received"
    type: assert
    assertion: message_count
    params:
      action: "MeterValues"
      message_type: "EVENT"
      min: 3

  - name: "Assert monotonically increasing"
    type: assert
    assertion: meter_values_monotonic

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
