name: "Meter Values Streaming"
description: "Start a session and verify at least 5 MeterValues are sent with monotonically increasing values"
station_count: 1
timeout_seconds: 90
tags: [session, meter_values]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "OneStopPay"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Wait for StartService"
    type: wait_for
    action: StartService
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert session active"
    type: assert
    assertion: session_active
    params:
      bay_number: 1
      expected: true

  - name: "Wait for 5 MeterValues"
    type: repeat
    count: 5
    steps:
      - name: "Wait for MeterValues event"
        type: wait_for
        action: MeterValues
        message_type: EVENT
        timeout_ms: 15000

  - name: "Assert at least 5 MeterValues received"
    type: assert
    assertion: message_count
    params:
      action: "MeterValues"
      message_type: "EVENT"
      min: 5

  - name: "Assert monotonically increasing"
    type: assert
    assertion: meter_values_monotonic

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
