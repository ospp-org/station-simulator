name: "Security Event"
description: "Send a SecurityEvent from station, verify it was sent successfully"
station_count: 1
timeout_seconds: 30
tags: [security, event]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Send SecurityEvent"
    type: send
    action: SecurityEvent
    message_type: event
    payload:
      stationId: "{{stationId}}"
      type: "FirmwareUpdated"
      timestamp: "2026-03-05T00:00:00Z"
      details: "Firmware updated to version 1.3.0"

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
