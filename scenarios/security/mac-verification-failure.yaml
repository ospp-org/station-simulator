name: "MAC Verification Failure"
description: "Send a SecurityEvent reporting MAC verification failure"
station_count: 1
timeout_seconds: 30
tags: [security, mac, hmac]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "OneStopPay"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Send SecurityEvent (MAC failure)"
    type: send
    action: SecurityEvent
    message_type: EVENT
    payload:
      stationId: "{{stationId}}"
      eventType: "MacVerificationFailure"
      severity: "High"
      details:
        action: "StartService"
        expectedMac: "abc123..."
        receivedMac: "def456..."
        messageId: "msg-001"

  - name: "Assert SecurityEvent was sent"
    type: assert
    assertion: message_received
    params:
      action: "SecurityEvent"
      message_type: "EVENT"

  - name: "Assert no errors in protocol"
    type: assert
    assertion: no_errors
