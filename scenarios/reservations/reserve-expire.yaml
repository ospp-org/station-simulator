name: "Reservation Expiry"
description: "Reserve a bay via CSMS API and let it expire, verify auto-return to Available"
station_count: 1
timeout_seconds: 120
tags: [reservation, expiry, timeout]

config:
  csms_url: "http://csms-nginx"
  csms_auth:
    email: "admin@csms.local"
    password: "password"

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Wait for bays ready"
    type: delay
    duration_ms: 2000

  - name: "Reserve bay with short TTL via CSMS API"
    type: api_call
    method: POST
    path: "/api/v1/reservations"
    body:
      bay_id: "{{bayId_1}}"
      duration_minutes: 1
      session_source: "MobileApp"
    expect_status: 201

  - name: "Wait for ReserveBay command"
    type: wait_for
    action: ReserveBay
    message_type: REQUEST
    timeout_ms: 25000

  - name: "Assert bay reserved"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Reserved"

  - name: "Wait for reservation TTL to expire"
    type: delay
    duration_ms: 65000

  - name: "Assert bay available after expiry"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Available"

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
