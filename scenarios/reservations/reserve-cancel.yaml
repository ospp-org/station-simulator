name: "Reserve and Cancel"
description: "Reserve a bay, then cancel the reservation, verify bay returns to Available"
station_count: 1
timeout_seconds: 30
tags: [reservation, cancel]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "OneStopPay"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Wait for StatusNotification"
    type: wait_for
    action: StatusNotification
    message_type: EVENT
    timeout_ms: 3000

  - name: "Assert bay 1 available"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Available"

  - name: "Wait for ReserveBay"
    type: wait_for
    action: ReserveBay
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert bay reserved"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Reserved"

  - name: "Wait for CancelReservation"
    type: wait_for
    action: CancelReservation
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert bay available again"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Available"

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
