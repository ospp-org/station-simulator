name: "Reserve Bay and Start Session"
description: "Reserve a bay, then start a session with matching reservationId"
station_count: 1
timeout_seconds: 60
tags: [reservation, session]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "OneStopPay"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Wait for StatusNotification"
    type: wait_for
    action: StatusNotification
    message_type: EVENT
    timeout_ms: 3000

  - name: "Wait for ReserveBay command"
    type: wait_for
    action: ReserveBay
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert bay reserved"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Reserved"

  - name: "Assert reservation response accepted"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Wait for StartService with reservation"
    type: wait_for
    action: StartService
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert bay occupied"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Occupied"

  - name: "Assert session active"
    type: assert
    assertion: session_active
    params:
      bay_number: 1
      expected: true
