name: "Soft Reset"
description: "Reset station via CSMS API, verify reboot cycle"
station_count: 1
timeout_seconds: 60
tags: [device-management, reset]

config:
  csms_url: "http://csms-nginx"
  csms_auth:
    email: "admin@csms.local"
    password: "password"

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"

  - name: "Send reset command via CSMS API"
    type: api_call
    method: POST
    path: "/api/v1/admin/stations/{{stationId}}/reset"
    body:
      type: "Soft"
    expect_status: 202

  - name: "Wait for Reset command"
    type: wait_for
    action: Reset
    message_type: REQUEST
    timeout_ms: 25000

  - name: "Wait for reboot cycle"
    type: delay
    duration_ms: 10000

  - name: "Wait for re-boot response"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert back online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"
