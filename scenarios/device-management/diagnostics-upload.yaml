name: "Diagnostics Upload"
description: "Send GetDiagnostics command and verify collection → upload → uploaded lifecycle"
station_count: 1
timeout_seconds: 60
tags: [device-management, diagnostics, smoke]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "OneStopPay"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Set diagnostics behavior to always succeed"
    type: set_behavior
    action: get_diagnostics
    config:
      accept_rate: 1.0
      failure_rate: 0.0

  - name: "Wait for GetDiagnostics command"
    type: wait_for
    action: GetDiagnostics
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert accepted"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Wait for DiagnosticsNotification (Collecting)"
    type: wait_for
    action: DiagnosticsNotification
    message_type: EVENT
    timeout_ms: 10000

  - name: "Wait for DiagnosticsNotification (Uploaded)"
    type: wait_for
    action: DiagnosticsNotification
    message_type: EVENT
    timeout_ms: 30000

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
