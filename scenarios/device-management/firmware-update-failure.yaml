name: "Firmware Update Failure"
description: "Trigger firmware update via CSMS API with failure behavior, verify DownloadFailed"
station_count: 1
timeout_seconds: 60
tags: [device-management, firmware, failure]

config:
  csms_url: "http://csms-nginx"
  csms_auth:
    email: "admin@csms.local"
    password: "password"

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Set firmware behavior to fail at downloading"
    type: set_behavior
    action: update_firmware
    config:
      accept_rate: 1.0
      failure_rate: 1.0
      failure_at_stage: "downloading"

  - name: "Trigger firmware update via CSMS API"
    type: api_call
    method: POST
    path: "/api/v1/admin/stations/{{stationId}}/firmware"
    body:
      firmwareUrl: "https://cdn.example.com/firmware/v1.3.0.bin"
      firmwareVersion: "1.3.0"
      checksum: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
      signature: "MEUCIQDsomebase64signaturedata"
    expect_status: 202

  - name: "Wait for UpdateFirmware command"
    type: wait_for
    action: UpdateFirmware
    message_type: REQUEST
    timeout_ms: 25000

  - name: "Wait for FirmwareStatusNotification (Downloading)"
    type: wait_for
    action: FirmwareStatusNotification
    message_type: EVENT
    timeout_ms: 30000

  - name: "Wait for FirmwareStatusNotification (Failed)"
    type: wait_for
    action: FirmwareStatusNotification
    message_type: EVENT
    timeout_ms: 30000

  - name: "Assert firmware failure reported"
    type: assert
    assertion: payload_field
    params:
      field: "status"
      value: "Failed"
