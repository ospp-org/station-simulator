name: "Service Catalog Update"
description: "Send UpdateServiceCatalog with new services, verify acceptance and bay notifications"
station_count: 1
timeout_seconds: 30
tags: [device-management, services]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Wait for UpdateServiceCatalog command"
    type: wait_for
    action: UpdateServiceCatalog
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert accepted"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Wait for StatusNotification with updated services"
    type: wait_for
    action: StatusNotification
    message_type: EVENT
    timeout_ms: 5000

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
