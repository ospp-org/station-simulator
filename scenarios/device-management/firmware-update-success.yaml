name: "Firmware Update Success"
description: "Send UpdateFirmware command and verify full lifecycle: download → verify → install → reboot → activated"
station_count: 1
timeout_seconds: 120
tags: [device-management, firmware, smoke]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Set firmware behavior to always succeed"
    type: set_behavior
    action: update_firmware
    config:
      accept_rate: 1.0
      failure_rate: 0.0

  - name: "Wait for UpdateFirmware command"
    type: wait_for
    action: UpdateFirmware
    message_type: REQUEST
    timeout_ms: 30000

  - name: "Assert accepted"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Wait for FirmwareStatusNotification (Downloading)"
    type: wait_for
    action: FirmwareStatusNotification
    message_type: EVENT
    timeout_ms: 10000

  - name: "Wait for FirmwareStatusNotification (Installed)"
    type: wait_for
    action: FirmwareStatusNotification
    message_type: EVENT
    timeout_ms: 60000

  - name: "Wait for FirmwareStatusNotification (Activated)"
    type: wait_for
    action: FirmwareStatusNotification
    message_type: EVENT
    timeout_ms: 30000

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
