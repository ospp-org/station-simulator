name: "Maintenance Mode"
description: "Enable maintenance mode via CSMS API, verify station accepts"
station_count: 1
timeout_seconds: 30
tags: [device-management, maintenance]

config:
  csms_url: "http://csms-nginx"
  csms_auth:
    email: "admin@csms.local"
    password: "password"

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Wait for boot to complete and bays to report"
    type: delay
    duration_ms: 2000

  - name: "Enable maintenance mode via CSMS API"
    type: api_call
    method: POST
    path: "/api/v1/admin/stations/{{stationId}}/maintenance"
    body:
      enabled: true
    expect_status: 202

  - name: "Wait for SetMaintenanceMode command"
    type: wait_for
    action: SetMaintenanceMode
    message_type: REQUEST
    timeout_ms: 25000

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
