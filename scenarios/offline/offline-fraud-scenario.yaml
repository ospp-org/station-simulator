name: "Offline Fraud Detection"
description: "Send multiple offline transactions rapidly to trigger fraud detection"
station_count: 1
timeout_seconds: 30
tags: [offline, fraud, security]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Send rapid transactions"
    type: repeat
    count: 5
    steps:
      - name: "Send TransactionEvent"
        type: send
        action: TransactionEvent
        message_type: REQUEST
        payload:
          offlineTxId: "tx_fraud_{{counter}}"
          offlinePassId: "pass_suspicious_001"
          userId: "user-suspect-001"
          bayId: "{{bayId_1}}"
          serviceId: "svc_wash_premium"
          txCounter: 1
          durationSeconds: 120
          creditsCharged: 100
          startedAt: "2026-01-01T00:00:00.000Z"
          endedAt: "2026-01-01T00:02:00.000Z"
          receipt:
            data: "{}"
            signature: "test-signature"
            signatureAlgorithm: "ECDSA-P256-SHA256"
          meterValues:
            liquidMl: 3000
            consumableMl: 250
            energyWh: 120

      - name: "Small delay between transactions"
        type: delay
        duration_ms: 100

  - name: "Assert multiple transactions sent"
    type: assert
    assertion: message_count
    params:
      action: "TransactionEvent"
      message_type: "REQUEST"
      min: 5
