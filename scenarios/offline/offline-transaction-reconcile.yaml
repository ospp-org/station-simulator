name: "Offline Transaction Reconciliation"
description: "Send TransactionEvent with signed receipt for offline reconciliation"
station_count: 1
timeout_seconds: 30
tags: [offline, transaction, reconciliation]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Send TransactionEvent"
    type: send
    action: TransactionEvent
    message_type: REQUEST
    payload:
      offlineTxId: "tx_offline_001"
      offlinePassId: "pass_offline_001"
      userId: "user-001"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      txCounter: 1
      durationSeconds: 300
      creditsCharged: 50
      startedAt: "2026-01-01T00:00:00.000Z"
      endedAt: "2026-01-01T00:05:00.000Z"
      receipt:
        data: "{}"
        signature: "test-signature"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      meterValues:
        liquidMl: 2500
        consumableMl: 150
        energyWh: 85

  - name: "Wait for transaction response"
    type: wait_for
    action: TransactionEvent
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert response received"
    type: assert
    assertion: message_received
    params:
      action: "TransactionEvent"
      message_type: "RESPONSE"
