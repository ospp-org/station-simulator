name: "Out-of-Order Events"
description: "Send MeterValues before StartService, StopService before session exists"
station_count: 1
timeout_seconds: 30
tags: [chaos, out-of-order, edge-case]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Send MeterValues before any session"
    type: send
    action: MeterValues
    message_type: EVENT
    payload:
      stationId: "{{stationId}}"
      bayId: "bay_{{stationId}}_1"
      sessionId: "nonexistent-session"
      meterValues:
        waterConsumptionMl: 100.0
        energyConsumptionWh: 10.0

  - name: "Small delay"
    type: delay
    duration_ms: 1000

  - name: "Assert station still online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"
