name: "Data Transfer"
description: "Send DataTransfer via CSMS API, verify station accepts vendor-specific data"
station_count: 1
timeout_seconds: 30
tags: [core, data_transfer]

config:
  csms_url: "http://csms-nginx"
  csms_auth:
    email: "admin@csms.local"
    password: "password"

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Send DataTransfer via CSMS API"
    type: api_call
    method: POST
    path: "/api/v1/admin/stations/{{stationId}}/data-transfer"
    body:
      vendorId: "AcmeCorp"
      dataId: "diagnostics_v2"
      data:
        collectMetrics: true
        uploadInterval: 3600
    expect_status: 202

  - name: "Wait for DataTransfer command"
    type: wait_for
    action: DataTransfer
    message_type: REQUEST
    timeout_ms: 25000

  - name: "Assert vendor data received"
    type: assert
    assertion: payload_field
    params:
      field: "vendorId"
      value: "AcmeCorp"

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
