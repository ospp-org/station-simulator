name: "Station Offline Recovery"
description: "Boot, go online, disconnect, reconnect, re-boot successfully"
station_count: 1
timeout_seconds: 60
tags: [core, connectivity, recovery]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Assert online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"

  - name: "Simulate disconnect"
    type: disconnect
    station: "{{stationId}}"
    reconnect_delay_ms: 3000

  - name: "Assert offline"
    type: assert
    assertion: station_state
    params:
      expected: "OFFLINE"

  - name: "Wait for reconnect"
    type: delay
    duration_ms: 5000

  - name: "Send new BootNotification after reconnect"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "ErrorRecovery"

  - name: "Wait for re-boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 10000

  - name: "Assert back online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"
