name: "Station Offline Recovery"
description: "Boot, go online, disconnect (triggers ConnectionLost LWT), reconnect, re-boot"
station_count: 1
timeout_seconds: 60
tags: [core, connectivity, recovery, lwt]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"

  - name: "Simulate disconnect (triggers LWT)"
    type: disconnect
    station: 1
    reconnect_delay_ms: 3000

  - name: "Assert offline"
    type: assert
    assertion: station_state
    params:
      expected: "OFFLINE"

  - name: "Wait for reconnect"
    type: delay
    duration_ms: 5000

  - name: "Send new BootNotification after reconnect"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "ErrorRecovery"

  - name: "Wait for re-boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert back online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"
