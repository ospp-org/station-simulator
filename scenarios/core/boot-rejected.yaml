name: "Boot Rejected Retry"
description: "Boot a station, receive Rejected response with retryInterval, verify retry and eventual accept"
station_count: 1
timeout_seconds: 120
tags: [core, boot, retry]

steps:
  - name: "Set behavior to reject boot"
    type: set_behavior
    action: boot_notification
    config:
      accept_rate: 0.0

  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for rejected response"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Assert Rejected"
    type: assert
    assertion: response_status
    params:
      expected: "Rejected"

  - name: "Assert station NOT online"
    type: assert
    assertion: station_state
    params:
      expected: "BOOTING"

  - name: "Wait for retry interval"
    type: delay
    duration_ms: 5000

  - name: "Set behavior to accept boot"
    type: set_behavior
    action: boot_notification
    config:
      accept_rate: 1.0

  - name: "Wait for retry boot response"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 70000

  - name: "Assert Accepted after retry"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"
