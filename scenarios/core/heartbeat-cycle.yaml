name: "Heartbeat Cycle"
description: "Boot, then verify 3 consecutive heartbeat request-response cycles"
station_count: 1
timeout_seconds: 60
tags: [core, heartbeat]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot accepted"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert station online"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Send 3 heartbeats"
    type: repeat
    count: 3
    steps:
      - name: "Send Heartbeat"
        type: send
        action: Heartbeat
        message_type: request
        payload: {}

      - name: "Wait for heartbeat response"
        type: wait_for
        action: Heartbeat
        message_type: RESPONSE
        timeout_ms: 25000

  - name: "Assert serverTime in last response"
    type: assert
    assertion: payload_field
    params:
      field: "serverTime"

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
