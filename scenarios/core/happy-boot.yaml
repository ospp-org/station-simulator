name: "Happy Boot"
description: "Boot a station, receive Accepted response, verify heartbeat and status notifications"
station_count: 1
timeout_seconds: 30
tags: [core, boot, smoke]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: REQUEST
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "OneStopPay"
      serialNumber: "{{serialNumber}}"
      bayCount: 4
      bootReason: "power_on"

  - name: "Wait for boot response"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 5000

  - name: "Assert Accepted"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Assert station online"
    type: assert
    assertion: station_state
    params:
      expected: "ONLINE"

  - name: "Assert response time"
    type: assert
    assertion: response_time
    params:
      max_ms: 5000

  - name: "Wait for StatusNotification (bay 1)"
    type: wait_for
    action: StatusNotification
    message_type: EVENT
    timeout_ms: 3000

  - name: "Assert bay 1 Available"
    type: assert
    assertion: bay_status
    params:
      bay_number: 1
      expected: "Available"

  - name: "Wait for first heartbeat"
    type: wait_for
    action: Heartbeat
    message_type: REQUEST
    timeout_ms: 35000

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
