name: "Happy Boot"
description: "Boot a station, receive Accepted response, verify heartbeat and status notifications"
station_count: 1
timeout_seconds: 45
tags: [core, boot, smoke]

steps:
  - name: "Send BootNotification"
    type: send
    action: BootNotification
    message_type: request
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.2.0"
      stationModel: "SimStation"
      stationVendor: "AcmeCorp"
      serialNumber: "{{serialNumber}}"
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      bayCount: 4
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"
        signalStrength: null
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"

  - name: "Wait for boot response"
    type: wait_for
    action: BootNotification
    message_type: RESPONSE
    timeout_ms: 25000

  - name: "Assert Accepted"
    type: assert
    assertion: response_status
    params:
      expected: "Accepted"

  - name: "Assert session key received"
    type: assert
    assertion: payload_field
    params:
      field: "sessionKey"

  - name: "Assert heartbeat interval"
    type: assert
    assertion: payload_field
    params:
      field: "heartbeatIntervalSec"

  - name: "Assert response time"
    type: assert
    assertion: response_time
    params:
      max_ms: 10000

  - name: "Assert no errors"
    type: assert
    assertion: no_errors
